<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="overlay">
      <section class="stage" id="stage" data-state="idle" data-mode="transcript">
        <div class="bubble pill platform-mac" id="bubble" data-wrap="single">
          <span class="indicator" id="indicator" aria-hidden="true">
            <span class="ind-dot"></span>
            <svg class="ind-spinner" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <circle class="track" cx="8" cy="8" r="6.5"></circle>
              <circle class="arc" cx="8" cy="8" r="6.5"></circle>
            </svg>
          </span>
          <div class="body" id="body">
            <div class="transcript" id="transcript">
              <span class="final-text" id="finalText"></span>
              <span class="partial-text" id="partialText"></span>
            </div>
            <div class="hint" id="hint" data-variant="text" data-visible="false">
              <span class="hint-label" id="hintLabel"></span>
            </div>
          </div>
          <span class="wave" id="waveformSlot" aria-hidden="true">
            <span class="status-bars" id="statusBars" data-active="false">
              <span class="status-bar"></span>
              <span class="status-bar"></span>
              <span class="status-bar"></span>
              <span class="status-bar"></span>
            </span>
          </span>
          <button class="retry-button" id="retryButton" type="button" aria-label="重试转写">
            <svg class="retry-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
              <path d="M20 4v6h-6"></path>
            </svg>
            <span class="retry-label" id="retryLabel">重试</span>
          </button>
        </div>
      </section>
    </main>
    <div class="measure-text" id="measureText"></div>
    <script type="module" src="./src/ui/main-overlay.ts"></script>
  </body>
</html>
