app:
  # 全局开始/结束录音热键
  hotkey: F13

asr:
  # 豆包大模型流式识别 WebSocket 地址
  ws_url: wss://openspeech.bytedance.com/api/v3/sauc/bigmodel_async

  # 资源 ID，需与控制台开通的服务一致
  resource_id: volc.seedasr.sauc.duration

  # 是否开启二遍识别。开=true 通常整体更准，但可能改变专有名词最终结果。
  enable_nonstream: false

  # 是否开启语义顺滑。开=true 文本更像自然书面语，但可能改写部分口语表达。
  enable_ddc: true

  # 热词表 ID。用于增强专有名词命中率。
  boosting_table_id: ba2441a3-91b8-4d8e-9514-c3ad18abad34

  # 高优先级直传热词。优先级高于热词表。
  context_hotwords:
    - word: Claude Code
      weight: 12
    - word: Claude
      weight: 12
    - word: Claudecode
      weight: 12
    - word: claude code
      weight: 12
    - word: claude
      weight: 12
    - word: codex
      weight: 10
    - word: OpenAI
      weight: 10
    - word: openai
      weight: 10
    - word: ChatGPT
      weight: 10
    - word: chatgpt
      weight: 10
    - word: GLM
      weight: 9
    - word: glm
      weight: 9
    - word: cronjob
      weight: 8
    - word: hermes
      weight: 8
    - word: openclaw
      weight: 8
    - word: obsidian
      weight: 8
    - word: schema
      weight: 8
    - word: cwd
      weight: 8
    - word: skill
      weight: 8
    - word: agent
      weight: 8

  # 下面这些是高级参数。
  # 当前项目一般不需要改，只有调识别效果或排查协议问题时再打开。
  #
  # 固定语种。留空表示自动判断；如果主要是纯中文场景，可改成 zh-CN。
  # language: ""
  #
  # 采样率与音频格式。当前录音链路默认就是 16k PCM raw 16bit 单声道。
  # sample_rate: 16000
  # audio_format: pcm
  # audio_codec: raw
  # audio_bits: 16
  # audio_channel: 1
  #
  # 模型与协议参数。通常保持默认即可。
  # model_name: bigmodel
  # model_version: "400"
  # operation: submit
  # sequence: 0
  #
  # 文本后处理参数。
  # enable_itn: true        # 数字、日期等格式化
  # enable_punc: true       # 自动标点
  # show_utterances: true   # 返回分句信息，供白字/灰字展示
  # result_type: full       # 返回全量文本
  #
  # 断句与收尾参数。想调“结束等待时机”再改这里。
  # end_window_size: 800
  # force_to_speech_time: 1000

auth:
  # 控制台应用 ID
  app_id: "5820286475"

  # 访问令牌
  access_token: "wayNEcG_RnkZ7FtpdxzLoHborgdGLebE"

  # 目前主流程未使用 secret_key，先保留在配置里
  secret_key: "uStVjj3L2gVuqvFRT_0oG8T9HnoME1dM"
